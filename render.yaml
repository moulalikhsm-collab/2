services:
  - type: web
    name: ecofriend-api
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: MONGODB_URI
        sync: false

      - key: SECRET_KEY
        sync: false
